<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steganography Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        #imageInput {
            display: none;
        }

        .preview-section {
            display: none;
            margin: 30px 0;
            text-align: center;
        }

        #preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
        }

        .preview-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .result-section {
            display: none;
            margin-top: 30px;
        }

        .result-header {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
        }

        .result-header.suspicious {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .result-header.clean {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .metrics {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .metric-item:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-weight: 500;
        }

        .metric-value {
            color: #333;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .explanation {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            color: #856404;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset {
            background: #6c757d;
            color: white;
        }

        .btn-reset:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #667eea;
            font-weight: 600;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #0c5aa0;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .upload-area {
                padding: 30px 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Steganography Detection System</h1>
        <p class="subtitle">Upload an image to detect if it contains hidden data</p>

        <div class="info-box">
            ℹ️ This system analyzes images for statistical anomalies that suggest hidden steganographic data.
        </div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Click to upload or drag & drop</div>
                <div class="upload-subtext">PNG, JPG, JPEG (Max 5MB)</div>
            </div>
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg">
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-label">Image Preview</div>
            <img id="preview" src="" alt="Preview">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing image... Please wait</div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header" id="resultHeader"></div>
            <div class="metrics" id="metrics"></div>
            <div class="explanation" id="explanation"></div>
            <div class="button-group">
                <button class="btn-reset" onclick="resetAnalysis()">Upload Another Image</button>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewSection = document.getElementById('previewSection');
        const preview = document.getElementById('preview');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultHeader = document.getElementById('resultHeader');
        const metrics = document.getElementById('metrics');
        const explanation = document.getElementById('explanation');

        // Upload area click
        uploadArea.addEventListener('click', () => imageInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imageInput.files = files;
                handleImageUpload();
            }
        });

        // File input change
        imageInput.addEventListener('change', handleImageUpload);

        function handleImageUpload() {
            const file = imageInput.files[0];
            if (!file) return;

            // Check file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('File size exceeds 5MB. Please choose a smaller image.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    preview.src = event.target.result;
                    previewSection.style.display = 'block';
                    loading.style.display = 'block';
                    resultSection.style.display = 'none';

                    // Analyze after a short delay for visual feedback
                    setTimeout(() => analyzeImage(img), 500);
                };
                img.onerror = function() {
                    alert('Error loading image. Please try another file.');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function analyzeImage(img) {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            // Perform multiple detection methods
            const lsbAnalysis = analyzeLSB(canvas, ctx);
            const entropyAnalysis = analyzeEntropy(canvas, ctx);
            const chiSquareTest = performChiSquareTest(canvas, ctx);
            const colorDistribution = analyzeColorDistribution(canvas, ctx);

            // Calculate overall suspicion score
            const suspicionScore = calculateSuspicionScore(
                lsbAnalysis.score,
                entropyAnalysis.score,
                chiSquareTest.score,
                colorDistribution.score
            );

            displayResults(
                suspicionScore,
                lsbAnalysis,
                entropyAnalysis,
                chiSquareTest,
                colorDistribution
            );

            loading.style.display = 'none';
            resultSection.style.display = 'block';
        }

        function analyzeLSB(canvas, ctx) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let lsbCount = [0, 0, 0]; // R, G, B
            let totalPixels = Math.floor(imgData.length / 4);

            for (let i = 0; i < imgData.length; i += 4) {
                lsbCount[0] += imgData[i] & 1;
                lsbCount[1] += imgData[i + 1] & 1;
                lsbCount[2] += imgData[i + 2] & 1;
            }

            const lsbRatios = lsbCount.map(count => count / totalPixels);
            const avg = (lsbRatios[0] + lsbRatios[1] + lsbRatios[2]) / 3;
            
            // Score based on uniformity (closer to 0.5 = more suspicious)
            let score = 0;
            lsbRatios.forEach(ratio => {
                const deviation = Math.abs(ratio - 0.5);
                score += (0.5 - deviation) * 100;
            });
            score = Math.min(score / 3, 100);

            return {
                ratios: lsbRatios,
                average: avg,
                score: score,
                label: 'LSB Uniformity'
            };
        }

        function analyzeEntropy(canvas, ctx) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const histogram = new Array(256).fill(0);
            
            for (let i = 0; i < imgData.length; i += 4) {
                const gray = (imgData[i] + imgData[i + 1] + imgData[i + 2]) / 3;
                histogram[Math.floor(gray)]++;
            }

            let entropy = 0;
            const totalPixels = histogram.reduce((a, b) => a + b);

            histogram.forEach(count => {
                if (count > 0) {
                    const probability = count / totalPixels;
                    entropy -= probability * Math.log2(probability);
                }
            });

            // Normalize entropy (0-8)
            const normalizedEntropy = entropy / 8;
            // High entropy = more suspicious
            const score = Math.min(normalizedEntropy * 100, 100);

            return {
                entropy: entropy.toFixed(3),
                normalized: normalizedEntropy.toFixed(3),
                score: score,
                label: 'Entropy Analysis'
            };
        }

        function performChiSquareTest(canvas, ctx) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const observed = new Array(256).fill(0);
            
            for (let i = 0; i < imgData.length; i += 4) {
                const gray = (imgData[i] + imgData[i + 1] + imgData[i + 2]) / 3;
                observed[Math.floor(gray)]++;
            }

            const expected = observed.reduce((a, b) => a + b) / 256;
            let chiSquare = 0;

            observed.forEach(count => {
                if (expected > 0) {
                    chiSquare += Math.pow(count - expected, 2) / expected;
                }
            });

            // Normalize chi-square value
            const score = Math.min((chiSquare / 1000) * 100, 100);

            return {
                chiSquare: chiSquare.toFixed(2),
                score: score,
                label: 'Chi-Square Test'
            };
        }

        function analyzeColorDistribution(canvas, ctx) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const channels = {
                red: new Array(256).fill(0),
                green: new Array(256).fill(0),
                blue: new Array(256).fill(0)
            };

            for (let i = 0; i < imgData.length; i += 4) {
                channels.red[imgData[i]]++;
                channels.green[imgData[i + 1]]++;
                channels.blue[imgData[i + 2]]++;
            }

            // Calculate variance for each channel
            const calculateVariance = (arr) => {
                const mean = arr.reduce((a, b) => a + b) / arr.length;
                const variance = arr.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / arr.length;
                return variance;
            };

            const redVar = calculateVariance(channels.red);
            const greenVar = calculateVariance(channels.green);
            const blueVar = calculateVariance(channels.blue);

            const avgVariance = (redVar + greenVar + blueVar) / 3;
            const score = Math.min((avgVariance / 1000) * 100, 100);

            return {
                redVariance: redVar.toFixed(2),
                greenVariance: greenVar.toFixed(2),
                blueVariance: blueVar.toFixed(2),
                score: score,
                label: 'Color Distribution'
            };
        }

        function calculateSuspicionScore(lsb, entropy, chiSquare, colorDist) {
            // Weighted average of all detection methods
            const weights = {
                lsb: 0.3,
                entropy: 0.25,
                chiSquare: 0.25,
                colorDist: 0.2
            };

            const overallScore = 
                (lsb * weights.lsb) +
                (entropy * weights.entropy) +
                (chiSquare * weights.chiSquare) +
                (colorDist * weights.colorDist);

            return Math.min(Math.max(overallScore, 0), 100);
        }

        function displayResults(suspicionScore, lsb, entropy, chiSquare, colorDist) {
            const isSuspicious = suspicionScore > 45;

            // Result header
            if (isSuspicious) {
                resultHeader.className = 'result-header suspicious';
                resultHeader.textContent = '⚠️ SUSPICIOUS - Possible Hidden Data Detected';
            } else {
                resultHeader.className = 'result-header clean';
                resultHeader.textContent = '✅ CLEAN - No Signs of Steganography';
            }

            // Metrics
            let metricsHTML = `
                <div class="metric-item">
                    <span class="metric-label">Overall Suspicion Score</span>
                    <span class="metric-value">${suspicionScore.toFixed(1)}%</span>
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" style="width: ${suspicionScore}%"></div>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #333; margin-bottom: 15px;">Detection Methods</h3>
                    
                    <div class="metric-item">
                        <span class="metric-label">LSB Uniformity</span>
                        <span class="metric-value">${lsb.score.toFixed(1)}%</span>
                    </div>
                    
                    <div class="metric-item">
                        <span class="metric-label">Entropy Analysis</span>
                        <span class="metric-value">${entropy.score.toFixed(1)}%</span>
                    </div>
                    
                    <div class="metric-item">
                        <span class="metric-label">Chi-Square Test</span>
                        <span class="metric-value">${chiSquare.score.toFixed(1)}%</span>
                    </div>
                    
                    <div class="metric-item">
                        <span class="metric-label">Color Distribution</span>
                        <span class="metric-value">${colorDist.score.toFixed(1)}%</span>
                    </div>

                    <div class="metric-item">
                        <span class="metric-label">Entropy Value</span>
                        <span class="metric-value">${entropy.entropy}</span>
                    </div>

                    <div class="metric-item">
                        <span class="metric-label">Chi-Square Value</span>
                        <span class="metric-value">${chiSquare.chiSquare}</span>
                    </div>
                </div>
            `;

            metrics.innerHTML = metricsHTML;

            // Explanation
            let explanationText = '';
            if (isSuspicious) {
                explanationText = `
                    <strong>⚠️ Warning:</strong> This image shows statistical patterns consistent with steganographic encoding. 
                    The analysis detected unusual uniformity in LSB patterns or statistical anomalies that suggest hidden data may be embedded. 
                    This could indicate LSB steganography, spread spectrum techniques, or other embedding methods.
                `;
            } else {
                explanationText = `
                    <strong>✅ Result:</strong> This image appears to be a normal photograph without obvious signs of steganographic embedding. 
                    The statistical analysis shows natural color distribution and entropy levels typical of unmodified images.
                `;
            }

            explanation.innerHTML = explanationText;
        }

        function resetAnalysis() {
            imageInput.value = '';
            previewSection.style.display = 'none';
            resultSection.style.display = 'none';
            loading.style.display = 'none';
            preview.src = '';
        }
    </script>
</body>
</html>
